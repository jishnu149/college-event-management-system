<!DOCTYPE html>
<html>
<head>
<title>Cultural Events</title>

<style>

body{font-family:Arial;background:#eee;}

header{
background:#222;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.btn{
background:green;
color:white;
padding:7px 12px;
text-decoration:none;
border-radius:5px;
display:inline-block;
margin:10px;
}

</style>
</head>

<body>

<header><h1>Cultural Events</h1></header>

<div class="container">

<div class="card">
<a href="details.html?event=Vibrance">
<img src="vibrance.JPG">
</a>
<h3>Vibrance</h3>
<p>Feb 18</p>
<a href="booking.html?event=Vibrance" class="btn">Book</a>
</div>


<div class="card">
<a href="details.html?event=Christmas">
<img src="christmas.jpg">
</a>
<h3>Christmas</h3>
<p>December 24</p>
<a href="booking.html?event=Christmas" class="btn">Book</a>
</div>

</div>

</body>
</html>
