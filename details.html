<!DOCTYPE html>
<html>
<head>
<title>Event Details</title>

<meta charset="UTF-8">

<style>

/* ===== GENERAL ===== */

body{
    margin:0;
    font-family:Segoe UI,Arial;
    background:linear-gradient(to bottom,#f0f4ff,#ffffff);
}


/* ===== HEADER ===== */

header{
    background:linear-gradient(to right,#141e30,#243b55);
    color:white;
    padding:15px;
    text-align:center;
}


/* ===== IMAGE ===== */

.banner{
    width:100%;
    height:380px;
    object-fit:cover;
}


/* ===== CONTENT ===== */

.container{
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}


h2{
    text-align:center;
    margin-top:0;
}


/* ===== INFO GRID ===== */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin:20px 0;
}


.box{
    background:#f6f9ff;
    padding:15px;
    border-radius:8px;
    border-left:5px solid #5b86e5;
}


.box span{
    font-weight:bold;
}


/* ===== STATUS ===== */

#status{
    text-align:center;
    font-size:18px;
    margin:15px 0;
    font-weight:bold;
}


/* ===== COUNTDOWN ===== */

#countdown{
    text-align:center;
    font-size:20px;
    margin:15px 0;
    color:#764ba2;
}


/* ===== BUTTON ===== */

.btn{
    display:block;
    width:220px;
    margin:20px auto;
    background:linear-gradient(to right,#36d1dc,#5b86e5);
    color:white;
    padding:12px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}


/* ===== FOOTER ===== */

footer{
    text-align:center;
    padding:15px;
    color:#555;
}

</style>
</head>


<body>


<header>
<h1>Event Information</h1>
</header>


<img id="img" class="banner">


<div class="container">


<h2 id="title"></h2>

<p id="info"></p>


<div id="status"></div>

<div id="countdown"></div>


<div class="grid">


<div class="box">
<span>📍 Venue:</span>
<p id="venue"></p>
</div>


<div class="box">
<span>🗓 Date:</span>
<p id="date"></p>
</div>


<div class="box">
<span>⏰ Time:</span>
<p id="time"></p>
</div>


</div>


<button class="btn" onclick="bookEvent()">Book Now</button>


</div>


<footer>
© 2026 VIT Event Portal
</footer>



<script>

/* ===== EVENT DATABASE ===== */

const data={

/* CULTURAL */

"Vibrance":{
 img:"vibrance.jpg",
 info:"Vibrance is the annual cultural fest featuring dance, music, drama, art exhibitions, fashion shows and inter-college competitions.",
 venue:"MG Auditorium",
 date:"18 Feb 2026",
 time:"9:00 AM - 6:00 PM"
},

"Christmas":{
 img:"christmas.jpg",
 info:"Christmas celebration with choir, cultural performances, carol singing, stage plays and community programs.",
 venue:"Netaji Auditorium",
 date:"24 Dec 2026",
 time:"4:00 PM - 8:00 PM"
},


/* SPORTS */

"FootBall Tournament":{
 img:"foo.png",
 info:"Inter-department football tournament encouraging teamwork, leadership and sportsmanship.",
 venue:"Football Ground",
 date:"12 Mar 2026",
 time:"8:00 AM - 5:00 PM"
},

"Championship Trophy":{
 img:"ch.webp",
 info:"Cricket championship involving teams from various colleges with knockout rounds.",
 venue:"Cricket Ground",
 date:"07 Apr 2026",
 time:"9:00 AM - 4:00 PM"
},


/* ACADEMIC */

"Student Workshop":{
 img:"stu.PNG",
 info:"Skill-based workshop on emerging technologies, project development and career readiness.",
 venue:"Kamaraj Auditorium",
 date:"11 Feb 2026",
 time:"10:00 AM - 1:00 PM"
},

"Seminar on Sustainability goals":{
 img:"sus.png",
 info:"Awareness seminar on sustainable development goals, climate change and environmental protection.",
 venue:"Netaji Auditorium",
 date:"16 Apr 2026",
 time:"11:00 AM - 3:00 PM"
},


/* TECHNICAL */

"DevsHouse":{
 img:"dev.png",
 info:"36-hour developer conference with coding contests, startup talks, mentorship and hack sessions. OD will be provided.",
 venue:"MG Auditorium",
 date:"25 Mar 2026",
 time:"9:00 AM - 9:00 PM"
},

"5G HACKATHON":{
 img:"co.png",
 info:"24-hour national-level hackathon focused on 5G applications, IoT and smart systems. OD will be provided.",
 venue:"Kamaraj Auditorium",
 date:"02 Jan 2026",
 time:"10:00 AM - Next Day"
}

};


/* ===== GET EVENT ===== */

const params=new URLSearchParams(window.location.search);
const eventName=params.get("event");


/* ===== LOAD DATA ===== */

if(eventName && data[eventName]){

 const e=data[eventName];

 document.getElementById("title").innerText=eventName;
 document.getElementById("img").src=e.img;
 document.getElementById("info").innerText=e.info;

 document.getElementById("venue").innerText=e.venue;
 document.getElementById("date").innerText=e.date;
 document.getElementById("time").innerText=e.time;

 setupTimer(e.date,e.time);

}


/* ===== COUNTDOWN & STATUS ===== */

function setupTimer(dateStr,timeStr){

 const start=new Date(dateStr+" "+timeStr.split("-")[0]);

 const status=document.getElementById("status");
 const cd=document.getElementById("countdown");


 setInterval(()=>{

  const now=new Date();
  const diff=start-now;


  if(diff>0){

   status.innerText="🟢 Status: Upcoming";
   status.style.color="green";

   const d=Math.floor(diff/86400000);
   const h=Math.floor((diff%86400000)/3600000);
   const m=Math.floor((diff%3600000)/60000);

   cd.innerText=`⏳ Starts in ${d}d ${h}h ${m}m`;

  }
  else if(diff>-6*3600000){

   status.innerText="🟠 Status: Ongoing";
   status.style.color="orange";

   cd.innerText="🔥 Event is Live Now";

  }
  else{

   status.innerText="🔴 Status: Completed";
   status.style.color="red";

   cd.innerText="Event Finished";

  }

 },1000);
}


/* ===== BOOKING SYSTEM ===== */

function bookEvent(){

 const user=JSON.parse(localStorage.getItem("loggedUser"));

 if(!user){

  localStorage.setItem("pendingEvent",eventName);
  location.href="login.html";
 }
 else{

  register(user,eventName);
 }
}


function register(user,event){

 let list=JSON.parse(localStorage.getItem("registrations"))||[];

 const exist=list.find(r=>r.reg===user.reg && r.event===event);

 if(exist){
  alert("Already Registered!");
  return;
 }

 list.push({
  reg:user.reg,
  name:user.name,
  event:event,
  time:new Date().toLocaleString()
 });

 localStorage.setItem("registrations",JSON.stringify(list));

 alert("Booking Successful!");

 location.href="home.html";
}

</script>


</body>
</html>
