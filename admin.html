<!DOCTYPE html>
<html>
<head>
<title>Admin - Registrations</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
}

h2{
    text-align:center;
}

table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid gray;
    padding:10px;
    text-align:center;
}

th{
    background:#222;
    color:white;
}

button{
    margin:20px auto;
    display:block;
    padding:10px 20px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkred;
}

</style>
</head>


<body>

<h2>All Event Registrations</h2>

<table id="table">

<tr>
<th>Name</th>
<th>Register No</th>
<th>Email</th>
<th>Event</th>
<th>Time</th>
</tr>

</table>

<button onclick="clearData()">Clear All</button>



<script>
const user = JSON.parse(localStorage.getItem("loggedUser"));

if(!user || user.role !== "admin"){
    alert("Access Denied!");
    location.href="index.html";
}


const table = document.getElementById("table");

/* Fetch all registrations */
fetch('/api/admin/bookings')
    .then(res => res.json())
    .then(data => {
        data.forEach(r => {
            const row = table.insertRow();
            row.insertCell(0).innerText = r.name;
            row.insertCell(1).innerText = r.reg;
            row.insertCell(2).innerText = r.email;
            row.insertCell(3).innerText = r.event;
            row.insertCell(4).innerText = r.time;
        });
    })
    .catch(err => console.error("Error fetching admin bookings:", err));


function clearData(){
    if(confirm("Delete all records?")){
        fetch('/api/admin/bookings', { method: 'DELETE' })
            .then(res => res.json().then(data => ({ status: res.status, body: data })))
            .then(response => {
                if(response.status === 200) {
                    location.reload();
                } else {
                    alert("Failed to clear records.");
                }
            })
            .catch(err => console.error("Error clearing data:", err));
    }
}

</script>

</body>
</html>
